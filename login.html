<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Log In | BrandWatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#4F46E5",
            secondary: "#06B6D4",
          },
          fontFamily: {
            heading: ['Inter', 'sans-serif'],
            body: ['Roboto', 'sans-serif'],
          },
          animation: {
            'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    };
  </script>
  
  <style>
    body {
      background-color: #F8FAFC;
      color: #0F172A;
      font-family: 'Roboto', sans-serif;
    }
    h1, h2, h3, h4, h5, h6 { font-family: 'Inter', sans-serif; }
    
    .glass-form {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(226, 232, 240, 0.8);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
    }

    .btn-primary {
      background: linear-gradient(135deg, #4F46E5 0%, #06B6D4 100%);
      transition: all 0.3s ease;
      color: white;
    }

    .btn-primary:hover {
      box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
      transform: translateY(-2px);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center relative overflow-hidden">
  
  <!-- Background Decorations -->
  <div class="fixed top-0 right-0 w-full h-full bg-gradient-to-br from-primary/5 via-secondary/5 to-transparent -z-10"></div>
  <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] bg-primary/10 rounded-full blur-[100px] -z-10 animate-pulse-slow"></div>
  <div class="fixed bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-secondary/15 rounded-full blur-[100px] -z-10 animate-pulse-slow" style="animation-delay: 2s;"></div>
  
  <!-- Back to Home -->
  <a href="/" class="absolute top-8 left-8 flex items-center gap-2 text-slate-500 hover:text-primary transition-colors font-semibold text-sm">
    <i data-lucide="arrow-left" class="w-4 h-4"></i>
    Back to Home
  </a>

  <!-- Login Container -->
  <div class="w-full max-w-md px-4 relative z-10">
    <div class="text-center mb-10">
      <div class="w-14 h-14 bg-gradient-to-br from-primary to-secondary rounded-2xl flex items-center justify-center shadow-lg shadow-primary/20 mx-auto mb-6 transform hover:rotate-12 transition-transform duration-300">
        <i data-lucide="bar-chart-3" class="text-white w-8 h-8"></i>
      </div>
      <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Welcome back</h2>
      <p class="text-slate-500 mt-2 font-medium">Please enter your details to sign in.</p>
    </div>

    <form id="login-form" class="glass-form p-8 sm:p-10 rounded-[2rem]">
      <div class="space-y-6">
        <!-- Inputs -->
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="email">Email</label>
            <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-slate-900 bg-white shadow-sm" placeholder="you@company.com">
          </div>
          
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label class="block text-sm font-semibold text-slate-700" for="password">Password</label>
              <a href="#" class="text-xs font-semibold text-primary hover:text-indigo-700">Forgot password?</a>
            </div>
            <div class="relative">
              <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-slate-900 bg-white shadow-sm" placeholder="••••••••">
            </div>
          </div>
        </div>

        <div id="error-message" class="text-red-500 text-sm hidden font-medium"></div>

        <button type="submit" class="btn-primary w-full py-3.5 rounded-xl font-bold flex justify-center items-center gap-2 shadow-lg">
          Sign In
          <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </button>
      </div>

      <p class="text-center text-sm text-slate-500 mt-8 font-medium">
        Don't have an account? 
        <a href="/signup" class="font-bold text-primary hover:text-indigo-700 transition-colors">Sign up</a>
      </p>
    </form>
  </div>

  <script>
    lucide.createIcons();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error-message');
      
      errorEl.classList.add('hidden');

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          window.location.href = '/dashboard';
        } else {
          errorEl.textContent = data.error || 'Login failed';
          errorEl.classList.remove('hidden');
        }
      } catch (err) {
        errorEl.textContent = 'Connection error. Please try again.';
        errorEl.classList.remove('hidden');
      }
    });
  </script>

</body>
</html>
