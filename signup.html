<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up | BrandWatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#4F46E5",
            secondary: "#06B6D4",
          },
          fontFamily: {
            heading: ['Inter', 'sans-serif'],
            body: ['Roboto', 'sans-serif'],
          },
          animation: {
            'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    };
  </script>
  
  <style>
    body {
      background-color: #F8FAFC;
      color: #0F172A;
      font-family: 'Roboto', sans-serif;
    }
    h1, h2, h3, h4, h5, h6 { font-family: 'Inter', sans-serif; }
    
    .glass-form {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(226, 232, 240, 0.8);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
    }

    .btn-primary {
      background: linear-gradient(135deg, #4F46E5 0%, #06B6D4 100%);
      transition: all 0.3s ease;
      color: white;
    }

    .btn-primary:hover {
      box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
      transform: translateY(-2px);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center relative overflow-hidden py-10">
  
  <!-- Background Decorations -->
  <div class="fixed top-0 right-0 w-full h-full bg-gradient-to-br from-primary/5 via-secondary/5 to-transparent -z-10"></div>
  <div class="fixed top-[10%] right-[-10%] w-[500px] h-[500px] bg-secondary/15 rounded-full blur-[100px] -z-10 animate-pulse-slow"></div>
  <div class="fixed bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-primary/10 rounded-full blur-[100px] -z-10 animate-pulse-slow" style="animation-delay: 2s;"></div>
  
  <!-- Back to Home -->
  <a href="/" class="absolute top-8 left-8 flex items-center gap-2 text-slate-500 hover:text-primary transition-colors font-semibold text-sm">
    <i data-lucide="arrow-left" class="w-4 h-4"></i>
    Back to Home
  </a>

  <!-- Signup Container -->
  <div class="w-full max-w-md px-4 relative z-10">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Create an account</h2>
      <p class="text-slate-500 mt-2 font-medium">Start monitoring your brand's sentiment today.</p>
    </div>

    <form id="signup-form" class="glass-form p-8 sm:p-10 rounded-[2rem]">
      <div class="space-y-5">
        <!-- Inputs -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="name">Full Name</label>
          <input type="text" id="name" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-slate-900 bg-white shadow-sm" placeholder="John Doe">
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="email">Work Email</label>
          <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-slate-900 bg-white shadow-sm" placeholder="you@company.com">
        </div>
        
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="password">Password</label>
          <div class="relative">
            <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-slate-900 bg-white shadow-sm" placeholder="Create a password">
          </div>
          <p class="text-[11px] text-slate-500 mt-2 font-medium">Must be at least 8 characters long.</p>
        </div>

        <div id="error-message" class="text-red-500 text-sm hidden font-medium"></div>

        <button type="submit" class="btn-primary w-full py-3.5 rounded-xl font-bold flex justify-center items-center gap-2 shadow-lg mt-6">
          Create Account
          <i data-lucide="user-plus" class="w-4 h-4"></i>
        </button>

      </div>

      <p class="text-center text-sm text-slate-500 mt-8 font-medium">
        Already have an account? 
        <a href="/login" class="font-bold text-primary hover:text-indigo-700 transition-colors">Sign in</a>
      </p>
    </form>
  </div>

  <script>
    lucide.createIcons();

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error-message');
      
      errorEl.classList.add('hidden');

      try {
        const response = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (response.ok) {
          window.location.href = '/dashboard';
        } else {
          errorEl.textContent = data.error || 'Signup failed';
          errorEl.classList.remove('hidden');
        }
      } catch (err) {
        errorEl.textContent = 'Connection error. Please try again.';
        errorEl.classList.remove('hidden');
      }
    });
  </script>
  <p class="text-center text-xs text-slate-400 mt-6 max-w-sm mx-auto">
      By signing up, you agree to our <a href="#" class="underline hover:text-slate-600">Terms of Service</a> and <a href="#" class="underline hover:text-slate-600">Privacy Policy</a>.
    </p>
  </div>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
